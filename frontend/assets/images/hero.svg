<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF5FF"/>
      <stop offset="100%" stop-color="#DDEBFF"/>
    </linearGradient>

    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="10"
      flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->

  <rect width="700" height="600" rx="40"
        fill="url(#bg)"/>

  <!-- Main Card -->

  <rect x="180" y="70"
        width="340"
        height="460"
        rx="28"
        fill="white"
        filter="url(#shadow)"/>

  <!-- Phone -->

  <rect x="250" y="100"
        width="200"
        height="380"
        rx="25"
        fill="#F8FAFC"
        stroke="#CBD5E1"
        stroke-width="3"/>

  <!-- Header -->

  <rect x="270" y="125"
        width="160"
        height="16"
        rx="8"
        fill="url(#blue)"/>

  <!-- Search -->

  <rect x="270"
        y="165"
        width="160"
        height="40"
        rx="20"
        fill="#EEF2FF"/>

  <circle cx="292"
          cy="185"
          r="8"
          fill="#2563EB"/>

  <line x1="298"
        y1="191"
        x2="304"
        y2="197"
        stroke="#2563EB"
        stroke-width="3"/>

  <!-- Service Cards -->

  <rect x="270"
        y="225"
        width="160"
        height="55"
        rx="15"
        fill="#DBEAFE"/>

  <rect x="270"
        y="295"
        width="160"
        height="55"
        rx="15"
        fill="#DCFCE7"/>

  <rect x="270"
        y="365"
        width="160"
        height="55"
        rx="15"
        fill="#F3E8FF"/>

  <!-- Icons -->

  <!-- Electrician -->

  <circle cx="120"
          cy="150"
          r="45"
          fill="#2563EB"/>

  <text x="120"
        y="162"
        text-anchor="middle"
        font-size="32"
        fill="white">⚡</text>

  <!-- Plumber -->

  <circle cx="565"
          cy="170"
          r="45"
          fill="#22C55E"/>

  <text x="565"
        y="182"
        text-anchor="middle"
        font-size="30"
        fill="white">🔧</text>

  <!-- Cleaning -->

  <circle cx="120"
          cy="430"
          r="45"
          fill="#F59E0B"/>

  <text x="120"
        y="442"
        text-anchor="middle"
        font-size="30"
        fill="white">🧹</text>

  <!-- AI -->

  <circle cx="565"
          cy="420"
          r="45"
          fill="#7C3AED"/>

  <text x="565"
        y="432"
        text-anchor="middle"
        font-size="28"
        fill="white">🤖</text>

  <!-- Connections -->

  <line x1="160" y1="150"
        x2="250" y2="170"
        stroke="#93C5FD"
        stroke-width="3"
        stroke-dasharray="8 8"/>

  <line x1="520" y1="180"
        x2="565" y2="220"
        stroke="#93C5FD"
        stroke-width="3"
        stroke-dasharray="8 8"/>

  <line x1="165" y1="430"
        x2="250" y2="410"
        stroke="#93C5FD"
        stroke-width="3"
        stroke-dasharray="8 8"/>

  <line x1="520" y1="410"
        x2="565" y2="420"
        stroke="#93C5FD"
        stroke-width="3"
        stroke-dasharray="8 8"/>

  <!-- Title -->

  <text x="350"
        y="560"
        text-anchor="middle"
        font-family="Poppins, Arial"
        font-size="24"
        font-weight="700"
        fill="#1E293B">

        Smart Hire

  </text>

  <text x="350"
        y="585"
        text-anchor="middle"
        font-family="Poppins, Arial"
        font-size="14"
        fill="#64748B">

        AI Powered Service Marketplace

  </text>

</svg>