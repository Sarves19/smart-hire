<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="500"
     height="420"
     viewBox="0 0 500 420">

    <defs>

        <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#EAF3FF"/>
        </linearGradient>

        <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60A5FA"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>

    </defs>

    <!-- Decorative Background -->

    <circle cx="250" cy="210" r="180" fill="rgba(255,255,255,0.08)"/>

    <circle cx="90" cy="80" r="10" fill="white" opacity=".35"/>
    <circle cx="420" cy="90" r="8" fill="white" opacity=".30"/>
    <circle cx="70" cy="330" r="8" fill="white" opacity=".25"/>
    <circle cx="430" cy="320" r="10" fill="white" opacity=".35"/>

    <!-- Phone -->

    <rect
        x="180"
        y="45"
        width="140"
        height="300"
        rx="28"
        fill="url(#phoneGradient)"
        stroke="#2563EB"
        stroke-width="5"/>

    <rect
        x="195"
        y="70"
        width="110"
        height="235"
        rx="12"
        fill="url(#screenGradient)"/>

    <!-- Camera -->

    <rect
        x="235"
        y="55"
        width="30"
        height="6"
        rx="3"
        fill="#CBD5E1"/>

    <!-- AI Circle -->

    <circle
        cx="250"
        cy="110"
        r="22"
        fill="#FACC15"/>

    <text
        x="250"
        y="116"
        text-anchor="middle"
        font-size="14"
        font-weight="700"
        fill="white">

        AI

    </text>

    <!-- Customer -->

    <circle
        cx="105"
        cy="185"
        r="34"
        fill="white"/>

    <circle
        cx="105"
        cy="175"
        r="12"
        fill="#2563EB"/>

    <rect
        x="82"
        y="192"
        width="46"
        height="48"
        rx="16"
        fill="white"/>

    <!-- Provider -->

    <circle
        cx="395"
        cy="185"
        r="34"
        fill="white"/>

    <circle
        cx="395"
        cy="175"
        r="12"
        fill="#2563EB"/>

    <rect
        x="372"
        y="192"
        width="46"
        height="48"
        rx="16"
        fill="white"/>

    <!-- Connection Lines -->

    <line
        x1="140"
        y1="185"
        x2="180"
        y2="185"
        stroke="white"
        stroke-width="4"/>

    <line
        x1="320"
        y1="185"
        x2="360"
        y2="185"
        stroke="white"
        stroke-width="4"/>

    <!-- Floating Icons -->

    <!-- Star -->

    <polygon
        points="250,20 255,33 270,33 258,42 262,56 250,48 238,56 242,42 230,33 245,33"
        fill="white"/>

    <!-- Check -->

    <circle
        cx="250"
        cy="285"
        r="20"
        fill="#22C55E"/>

    <path
        d="M242 285 L248 291 L259 278"
        fill="none"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- User Card -->

    <rect
        x="210"
        y="145"
        width="80"
        height="55"
        rx="8"
        fill="white"
        opacity=".95"/>

    <circle
        cx="225"
        cy="160"
        r="7"
        fill="#2563EB"/>

    <rect
        x="238"
        y="156"
        width="35"
        height="4"
        rx="2"
        fill="#CBD5E1"/>

    <rect
        x="238"
        y="166"
        width="25"
        height="4"
        rx="2"
        fill="#CBD5E1"/>

    <!-- Bottom Button -->

    <rect
        x="215"
        y="320"
        width="70"
        height="14"
        rx="7"
        fill="#2563EB"/>

</svg>