<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Smart Hire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { min-height: 100vh; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at 18% 15%, rgba(18,184,134,0.2), transparent 35%), radial-gradient(circle at 78% 10%, rgba(25,113,194,0.22), transparent 38%), linear-gradient(125deg, #f8fafc, #e6fcf5 45%, #e7f5ff); display: grid; place-items: center; padding: 1.5rem; }
    .auth-shell { width: 100%; max-width: 460px; background: rgba(255,255,255,0.92); border-radius: 20px; border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 20px 50px rgba(15,23,42,0.15); overflow: hidden; }
    .auth-head { padding: 1.2rem 1.4rem; color: #fff; background: linear-gradient(120deg, #087f5b, #1864ab); }
    .form-control { border-radius: 12px; }
    .btn-primary { border: none; border-radius: 12px; background: linear-gradient(120deg, #087f5b, #1864ab); font-weight: 600; }
  </style>
</head>
<body>
  <main class="auth-shell">
    <header class="auth-head"><h1 class="h4 mb-1">Welcome Back</h1><p class="mb-0 opacity-75">Sign in to your Smart Hire account.</p></header>
    <section class="p-4 p-md-5">
      <div id="alertContainer" aria-live="polite"></div>
      <form id="loginForm" novalidate>
        <div class="mb-3"><label for="email" class="form-label">Email</label><input id="email" type="email" class="form-control" required autocomplete="email" /><div class="invalid-feedback">Please enter a valid email.</div></div>
        <div class="mb-2">
          <label for="password" class="form-label">Password</label>
          <div class="input-group"><input id="password" type="password" class="form-control" required autocomplete="current-password" /><button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button></div>
          <div class="invalid-feedback">Password is required.</div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check"><input class="form-check-input" type="checkbox" id="rememberMe" /><label class="form-check-label" for="rememberMe">Remember me</label></div>
          <a href="forgot-password.html" class="text-decoration-none fw-semibold">Forgot password?</a>
        </div>
        <button id="submitBtn" class="btn btn-primary w-100" type="submit"><span class="btn-label">Sign In</span><span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span></button>
      </form>
      <p class="text-center mt-4 mb-0 text-secondary small">New to Smart Hire? <a href="register.html" class="fw-semibold text-decoration-none">Create account</a></p>
    </section>
  </main>

  <script>
    const API_BASE_URL = "http://localhost:8000/api/v1";
    const el = {
      form: document.getElementById("loginForm"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      submitBtn: document.getElementById("submitBtn"),
      alertContainer: document.getElementById("alertContainer"),
      togglePassword: document.getElementById("togglePassword")
    };

    function showAlert(type, message) {
      el.alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
    }

    function setLoading(isLoading) {
      const spinner = el.submitBtn.querySelector(".spinner-border");
      const label = el.submitBtn.querySelector(".btn-label");
      el.submitBtn.disabled = isLoading;
      spinner.classList.toggle("d-none", !isLoading);
      label.textContent = isLoading ? "Signing in..." : "Sign In";
    }

    function validateForm() {
      let valid = true;
      if (!el.email.checkValidity()) { el.email.classList.add("is-invalid"); valid = false; } else { el.email.classList.remove("is-invalid"); }
      if (!el.password.value) { el.password.classList.add("is-invalid"); valid = false; } else { el.password.classList.remove("is-invalid"); }
      return valid;
    }

    async function postJson(path, payload) {
      const response = await fetch(`${API_BASE_URL}${path}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || data.message || "Login failed.");
      return data;
    }

    function storeTokens(data) {
      const accessToken = data.access_token || data?.data?.access_token;
      const refreshToken = data.refresh_token || data?.data?.refresh_token;
      const user = data.user || data?.data?.user;
      if (!accessToken || !refreshToken || !user) throw new Error("Login response is missing token information.");
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      localStorage.setItem("user", JSON.stringify(user));
    }

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      el.alertContainer.innerHTML = "";
      if (!validateForm()) { showAlert("danger", "Please enter your email and password."); return; }
      try {
        setLoading(true);
        const res = await postJson("/auth/login", { email: el.email.value.trim(), password: el.password.value });
        storeTokens(res);
        showAlert("success", "Login successful. Redirecting...");
        setTimeout(() => { window.location.href = "/dashboard.html"; }, 700);
      } catch (error) {
        showAlert("danger", error.message || "Unable to sign in.");
      } finally {
        setLoading(false);
      }
    });

    el.togglePassword.addEventListener("click", () => {
      const icon = el.togglePassword.querySelector("i");
      el.password.type = el.password.type === "password" ? "text" : "password";
      icon.className = el.password.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
