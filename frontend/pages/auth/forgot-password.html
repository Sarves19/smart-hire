<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Smart Hire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { min-height: 100vh; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at 20% 15%, rgba(30, 136, 229, 0.2), transparent 35%), radial-gradient(circle at 80% 20%, rgba(46, 204, 113, 0.2), transparent 35%), linear-gradient(130deg, #f1f3f5, #e3fafc 50%, #ebfbee); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .shell { width: 100%; max-width: 460px; border-radius: 18px; overflow: hidden; background: rgba(255, 255, 255, 0.93); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14); }
    .head { color: #fff; padding: 1.15rem 1.4rem; background: linear-gradient(120deg, #1e88e5, #2ecc71); }
    .form-control { border-radius: 12px; }
    .btn-primary { border: none; border-radius: 12px; font-weight: 600; background: linear-gradient(120deg, #1e88e5, #2ecc71); }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head"><h1 class="h4 mb-1">Forgot Password</h1><p class="mb-0 opacity-75">Enter your email to receive a reset OTP.</p></header>
    <section class="p-4 p-md-5">
      <div id="alertContainer" aria-live="polite"></div>
      <form id="forgotForm" novalidate>
        <div class="mb-3"><label for="email" class="form-label">Email</label><input id="email" type="email" class="form-control" required autocomplete="email" /><div class="invalid-feedback">Please enter a valid email address.</div></div>
        <button id="submitBtn" class="btn btn-primary w-100" type="submit"><span class="btn-label">Send OTP</span><span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span></button>
      </form>
      <p class="text-center mt-4 mb-0 text-secondary small">Remembered your password? <a href="login.html" class="fw-semibold text-decoration-none">Back to login</a></p>
    </section>
  </main>

  <script>
    const API_BASE_URL = "http://localhost:8000/api/v1";
    const el = {
      form: document.getElementById("forgotForm"),
      email: document.getElementById("email"),
      submitBtn: document.getElementById("submitBtn"),
      alertContainer: document.getElementById("alertContainer")
    };

    function showAlert(type, message) {
      el.alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
    }

    function setLoading(isLoading) {
      const spinner = el.submitBtn.querySelector(".spinner-border");
      const label = el.submitBtn.querySelector(".btn-label");
      el.submitBtn.disabled = isLoading;
      spinner.classList.toggle("d-none", !isLoading);
      label.textContent = isLoading ? "Sending OTP..." : "Send OTP";
    }

    async function postJson(path, payload) {
      const response = await fetch(`${API_BASE_URL}${path}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || data.message || "Unable to process request.");
      return data;
    }

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      el.alertContainer.innerHTML = "";
      if (!el.email.checkValidity()) { el.email.classList.add("is-invalid"); showAlert("danger", "Please provide a valid email address."); return; }
      el.email.classList.remove("is-invalid");
      const email = el.email.value.trim();
      try {
        setLoading(true);
        await postJson("/auth/forgot-password", { email });
        showAlert("success", "OTP sent successfully. Redirecting to reset password...");
        setTimeout(() => { window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`; }, 900);
      } catch (error) {
        showAlert("danger", error.message || "Failed to send OTP.");
      } finally {
        setLoading(false);
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
