<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Smart Hire</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { min-height: 100vh; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at 17% 20%, rgba(252, 196, 25, 0.22), transparent 35%), radial-gradient(circle at 82% 8%, rgba(18, 184, 134, 0.24), transparent 36%), linear-gradient(130deg, #fff9db, #e6fcf5 52%, #f8f9fa); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .shell { width: 100%; max-width: 560px; border-radius: 20px; overflow: hidden; background: rgba(255, 255, 255, 0.94); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 20px 50px rgba(15, 23, 42, 0.16); }
    .head { color: #fff; padding: 1.2rem 1.4rem; background: linear-gradient(120deg, #f08c00, #0ca678); }
    .form-control { border-radius: 12px; }
    .btn-primary { border: none; border-radius: 12px; font-weight: 600; background: linear-gradient(120deg, #f08c00, #0ca678); }
    .meter { height: 8px; border-radius: 999px; background: #e9ecef; overflow: hidden; }
    .meter-fill { width: 0; height: 100%; transition: width 0.25s ease, background-color 0.25s ease; }
    .otp-input { letter-spacing: 0.45rem; font-size: 1.2rem; text-align: center; font-weight: 700; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head"><h1 class="h4 mb-1">Reset Password</h1><p class="mb-0 opacity-75">Enter the OTP and choose your new password.</p></header>
    <section class="p-4 p-md-5">
      <div id="alertContainer" aria-live="polite"></div>
      <p class="small text-secondary mb-3">Reset for: <span id="emailDisplay" class="fw-semibold">-</span></p>
      <form id="resetForm" novalidate>
        <div class="mb-3"><label for="otpCode" class="form-label">6-digit OTP</label><input id="otpCode" type="text" class="form-control otp-input" maxlength="6" inputmode="numeric" placeholder="123456" required /><div class="invalid-feedback">Enter a valid 6-digit OTP.</div></div>
        <div class="mb-3">
          <label for="newPassword" class="form-label">New Password</label>
          <div class="input-group"><input id="newPassword" type="password" class="form-control" required minlength="8" autocomplete="new-password" /><button class="btn btn-outline-secondary" type="button" data-toggle-password="newPassword" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button></div>
          <div class="meter mt-2"><div id="passwordMeter" class="meter-fill"></div></div>
          <small id="passwordText" class="text-secondary">Password strength: -</small>
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm New Password</label>
          <div class="input-group"><input id="confirmPassword" type="password" class="form-control" required minlength="8" autocomplete="new-password" /><button class="btn btn-outline-secondary" type="button" data-toggle-password="confirmPassword" aria-label="Toggle confirm password visibility"><i class="bi bi-eye"></i></button></div>
          <div class="invalid-feedback d-block" id="confirmError"></div>
        </div>
        <button id="submitBtn" class="btn btn-primary w-100" type="submit"><span class="btn-label">Reset Password</span><span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span></button>
      </form>
    </section>
  </main>

  <script>
    const API_BASE_URL = "http://localhost:8000/api/v1";
    const OTP_REGEX = /^\d{6}$/;
    const params = new URLSearchParams(window.location.search);
    const email = (params.get("email") || "").trim();

    const el = {
      form: document.getElementById("resetForm"),
      otpCode: document.getElementById("otpCode"),
      newPassword: document.getElementById("newPassword"),
      confirmPassword: document.getElementById("confirmPassword"),
      confirmError: document.getElementById("confirmError"),
      meter: document.getElementById("passwordMeter"),
      meterText: document.getElementById("passwordText"),
      submitBtn: document.getElementById("submitBtn"),
      alertContainer: document.getElementById("alertContainer"),
      emailDisplay: document.getElementById("emailDisplay")
    };
    el.emailDisplay.textContent = email || "No email provided";

    function showAlert(type, message) {
      el.alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
    }

    function setLoading(isLoading) {
      const spinner = el.submitBtn.querySelector(".spinner-border");
      const label = el.submitBtn.querySelector(".btn-label");
      el.submitBtn.disabled = isLoading;
      spinner.classList.toggle("d-none", !isLoading);
      label.textContent = isLoading ? "Resetting..." : "Reset Password";
    }

    function strength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      const levels = [
        { label: "Very weak", color: "#c92a2a", width: 15 },
        { label: "Weak", color: "#e67700", width: 35 },
        { label: "Fair", color: "#f08c00", width: 55 },
        { label: "Good", color: "#2b8a3e", width: 75 },
        { label: "Strong", color: "#087f5b", width: 100 }
      ];
      return levels[Math.max(0, score - 1)] || levels[0];
    }

    function updateStrength() {
      const s = strength(el.newPassword.value);
      el.meter.style.width = `${s.width}%`;
      el.meter.style.backgroundColor = s.color;
      el.meterText.textContent = `Password strength: ${s.label}`;
    }

    function validate() {
      let valid = true;
      if (!email) { showAlert("danger", "Email parameter is missing. Please start from forgot password page."); return false; }
      if (!OTP_REGEX.test(el.otpCode.value.trim())) { el.otpCode.classList.add("is-invalid"); valid = false; } else { el.otpCode.classList.remove("is-invalid"); }
      if (!el.newPassword.value || el.newPassword.value.length < 8) { el.newPassword.classList.add("is-invalid"); valid = false; } else { el.newPassword.classList.remove("is-invalid"); }
      if (el.newPassword.value !== el.confirmPassword.value) { el.confirmPassword.classList.add("is-invalid"); el.confirmError.textContent = "Passwords do not match."; valid = false; } else { el.confirmPassword.classList.remove("is-invalid"); el.confirmError.textContent = ""; }
      return valid;
    }

    async function postJson(path, payload) {
      const response = await fetch(`${API_BASE_URL}${path}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || data.message || "Reset password failed.");
      return data;
    }

    el.otpCode.addEventListener("input", () => { el.otpCode.value = el.otpCode.value.replace(/\D/g, ""); });
    el.newPassword.addEventListener("input", updateStrength);

    document.querySelectorAll("[data-toggle-password]").forEach((button) => {
      button.addEventListener("click", () => {
        const target = document.getElementById(button.getAttribute("data-toggle-password"));
        const icon = button.querySelector("i");
        target.type = target.type === "password" ? "text" : "password";
        icon.className = target.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
      });
    });

    el.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      el.alertContainer.innerHTML = "";
      if (!validate()) { showAlert("danger", "Please check the form fields and try again."); return; }
      try {
        setLoading(true);
        await postJson("/auth/reset-password", { email, otp_code: el.otpCode.value.trim(), new_password: el.newPassword.value });
        showAlert("success", "Password reset successful. Redirecting to login...");
        setTimeout(() => { window.location.href = "login.html"; }, 900);
      } catch (error) {
        showAlert("danger", error.message || "Unable to reset password.");
      } finally {
        setLoading(false);
      }
    });

    updateStrength();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
