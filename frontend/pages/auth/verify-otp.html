<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP | Smart Hire</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(
            circle at 80% 20%,
            rgba(34, 139, 230, 0.2),
            transparent 38%
          ),
          radial-gradient(
            circle at 20% 30%,
            rgba(12, 166, 120, 0.2),
            transparent 40%
          ),
          linear-gradient(130deg, #edf2ff, #e3fafc 48%, #f8f9fa);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card-shell {
        width: 100%;
        max-width: 500px;
        border-radius: 20px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }
      .card-head {
        color: #fff;
        padding: 1.2rem 1.4rem;
        background: linear-gradient(120deg, #0ca678, #1c7ed6);
      }
      .form-control {
        border-radius: 12px;
      }
      .btn-primary {
        border: none;
        border-radius: 12px;
        background: linear-gradient(120deg, #0ca678, #1c7ed6);
        font-weight: 600;
      }
      .otp-input {
        letter-spacing: 0.45rem;
        font-size: 1.25rem;
        text-align: center;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card-shell">
      <header class="card-head">
        <h1 class="h4 mb-1">Verify Your Email</h1>
        <p class="mb-0 opacity-75">Enter the 6-digit OTP sent to your inbox.</p>
      </header>
      <section class="p-4 p-md-5">
        <div id="alertContainer" aria-live="polite"></div>
        <p class="small text-secondary mb-3">
          Verifying: <span id="emailDisplay" class="fw-semibold">-</span>
        </p>
        <form id="verifyForm" novalidate>
          <div class="mb-3">
            <label for="otpCode" class="form-label">OTP Code</label>
            <input
              id="otpCode"
              type="text"
              class="form-control otp-input"
              inputmode="numeric"
              maxlength="6"
              placeholder="123456"
              required
            />
            <div class="invalid-feedback">
              Please enter a valid 6-digit OTP.
            </div>
          </div>
          <button id="submitBtn" class="btn btn-primary w-100" type="submit">
            <span class="btn-label">Verify OTP</span
            ><span
              class="spinner-border spinner-border-sm ms-2 d-none"
              aria-hidden="true"
            ></span>
          </button>
        </form>
        <div class="text-center mt-4">
          <button id="resendBtn" class="btn btn-link text-decoration-none">
            Resend OTP
          </button>
          <div id="resendHint" class="small text-secondary"></div>
        </div>
      </section>
    </main>

    <script>
      const API_BASE_URL = "http://localhost:8000/api/v1";
      const OTP_REGEX = /^\d{6}$/;
      const params = new URLSearchParams(window.location.search);
      const email = (params.get("email") || "").trim();

      const el = {
        form: document.getElementById("verifyForm"),
        otpCode: document.getElementById("otpCode"),
        submitBtn: document.getElementById("submitBtn"),
        resendBtn: document.getElementById("resendBtn"),
        resendHint: document.getElementById("resendHint"),
        emailDisplay: document.getElementById("emailDisplay"),
        alertContainer: document.getElementById("alertContainer"),
      };
      el.emailDisplay.textContent = email || "No email provided";

      function showAlert(type, message) {
        el.alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
      }

      function setLoading(isLoading) {
        const spinner = el.submitBtn.querySelector(".spinner-border");
        const label = el.submitBtn.querySelector(".btn-label");
        el.submitBtn.disabled = isLoading;
        spinner.classList.toggle("d-none", !isLoading);
        label.textContent = isLoading ? "Verifying..." : "Verify OTP";
      }

      async function postJson(path, payload) {
        const response = await fetch(`${API_BASE_URL}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok)
          throw new Error(
            data.detail ||
              data.message ||
              response.statusText ||
              "Request failed.",
          );
        return data;
      }

      function storeTokens(data) {
        const accessToken = data.access_token || data?.data?.access_token;
        const refreshToken = data.refresh_token || data?.data?.refresh_token;
        const user = data.user || data?.data?.user;
        if (!accessToken || !refreshToken || !user)
          throw new Error(
            "Verification succeeded but token payload is missing.",
          );
        localStorage.setItem("access_token", accessToken);
        localStorage.setItem("refresh_token", refreshToken);
        localStorage.setItem("user", JSON.stringify(user));
      }

      let cooldown = 0;
      let timer = null;
      function startCooldown(seconds) {
        cooldown = seconds;
        el.resendBtn.disabled = true;
        el.resendHint.textContent = `You can resend OTP in ${cooldown}s`;
        timer = setInterval(() => {
          cooldown -= 1;
          if (cooldown <= 0) {
            clearInterval(timer);
            el.resendBtn.disabled = false;
            el.resendHint.textContent = "";
            return;
          }
          el.resendHint.textContent = `You can resend OTP in ${cooldown}s`;
        }, 1000);
      }

      el.otpCode.addEventListener("input", () => {
        el.otpCode.value = el.otpCode.value.replace(/\D/g, "");
      });

      el.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        el.alertContainer.innerHTML = "";
        if (!email) {
          showAlert(
            "danger",
            "Email parameter is missing. Please start registration again.",
          );
          return;
        }
        if (!OTP_REGEX.test(el.otpCode.value.trim())) {
          el.otpCode.classList.add("is-invalid");
          return;
        }
        el.otpCode.classList.remove("is-invalid");
        try {
          setLoading(true);
          const res = await postJson("/auth/verify-otp", {
            email,
            otp_code: el.otpCode.value.trim(),
          });
          storeTokens(res);
          showAlert("success", "OTP verified successfully. Redirecting...");
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 700);
        } catch (error) {
          showAlert("danger", error.message || "Unable to verify OTP.");
        } finally {
          setLoading(false);
        }
      });

      el.resendBtn.addEventListener("click", async () => {
        if (!email) {
          showAlert("danger", "Email parameter is missing.");
          return;
        }
        el.resendBtn.disabled = true;
        el.resendBtn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>Resending...';
        try {
          await postJson("/auth/resend-otp", { email });
          showAlert("success", "A new OTP has been sent.");
          startCooldown(30);
        } catch (error) {
          showAlert("danger", error.message || "Could not resend OTP.");
          el.resendBtn.disabled = false;
        } finally {
          el.resendBtn.innerHTML = "Resend OTP";
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
