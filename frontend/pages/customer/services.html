<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Browse Services | Smart Hire</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../../assets/css/customer/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/customer/services.css">

    <!-- Shared Components -->
    <link rel="stylesheet" href="../../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/components/navbar.css">
    <link rel="stylesheet" href="../../assets/css/components/footer.css">
    <link rel="stylesheet" href="../../assets/css/components/loader.css">

</head>

<body>

    <div id="loader-container"></div>

    <div id="dashboard-wrapper">

        <aside id="sidebar-container" data-component="../../components/sidebar.html"></aside>

        <main id="main-content">

            <header id="navbar-container" data-component="../../components/navbar.html"></header>

            <section id="dashboard-content">

                <section class="page-header">
                    <div>
                        <h1>Browse Services</h1>
                        <p>Find trusted professionals for any job, big or small.</p>
                    </div>
                </section>

                <section class="services-filters">

                    <div class="filter-search">
                        <i class="bi bi-search"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search services (e.g. cleaning, plumbing, tutoring)">
                    </div>

                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                    </select>

                    <select id="sortFilter" class="filter-select">
                        <option value="newest">Newest</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="rating">Highest Rated</option>
                    </select>

                </section>

                <section class="services-results">
                    <p id="resultsCount" class="results-count"></p>
                </section>

                <section id="servicesGrid" class="services-grid">
                </section>

                <div id="servicesEmptyState" class="services-empty-state" style="display: none;">
                    <i class="bi bi-search"></i>
                    <h3>No services found</h3>
                    <p>Try adjusting your search or filters.</p>
                </div>

            </section>

            <footer id="footer-container" data-component="../../components/footer.html"></footer>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/utils/helpers.js"></script>

    <script src="../../assets/js/services/api-client.js"></script>
    <script src="../../assets/js/services/auth-service.js"></script>

    <script src="../../assets/js/components/loader.js"></script>
    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/components/navbar.js"></script>
    <script src="../../assets/js/components/footer.js"></script>

    <script src="../../assets/js/customer/services.js"></script>

</body>

</html>
