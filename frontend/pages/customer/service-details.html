<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Service Details | Smart Hire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../assets/css/customer/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/customer/service-details.css">

    <link rel="stylesheet" href="../../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/components/navbar.css">
    <link rel="stylesheet" href="../../assets/css/components/footer.css">
    <link rel="stylesheet" href="../../assets/css/components/loader.css">

</head>

<body>

    <div id="loader-container"></div>

    <div id="dashboard-wrapper">

        <aside id="sidebar-container" data-component="../../components/sidebar.html"></aside>

        <main id="main-content">

            <header id="navbar-container" data-component="../../components/navbar.html"></header>

            <section id="dashboard-content">

                <a href="services.html" class="back-link">
                    <i class="bi bi-arrow-left"></i> Back to Services
                </a>

                <div id="serviceDetailsContainer">
                    <!-- Populated by service-details.js -->
                    <div class="loading-placeholder">Loading service details…</div>
                </div>

            </section>

            <footer id="footer-container" data-component="../../components/footer.html"></footer>

        </main>

    </div>

    <!-- ==========================================
         Booking Modal
    =========================================== -->

    <div id="bookingModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">

            <div class="modal-header">
                <h3>Book This Service</h3>
                <button id="closeBookingModal" class="modal-close">&times;</button>
            </div>

            <form id="bookingForm">

                <div class="form-group">
                    <label for="bookingDate">Date &amp; Time</label>
                    <input type="datetime-local" id="bookingDate" required>
                </div>

                <div class="form-group">
                    <label for="bookingNote">Notes for the provider (optional)</label>
                    <textarea id="bookingNote" rows="3" placeholder="E.g. gate code, specific requirements..."></textarea>
                </div>

                <div id="bookingFormError" class="form-error" style="display: none;"></div>
                <div id="bookingFormSuccess" class="form-success" style="display: none;"></div>

                <button type="submit" id="bookingSubmitBtn" class="btn-primary-full">
                    Confirm Booking
                </button>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/utils/helpers.js"></script>

    <script src="../../assets/js/services/api-client.js"></script>
    <script src="../../assets/js/services/auth-service.js"></script>

    <script src="../../assets/js/components/loader.js"></script>
    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/components/navbar.js"></script>
    <script src="../../assets/js/components/footer.js"></script>

    <script src="../../assets/js/customer/service-details.js"></script>

</body>

</html>
