<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Bookings | Smart Hire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../assets/css/customer/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/customer/bookings.css">

    <link rel="stylesheet" href="../../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/components/navbar.css">
    <link rel="stylesheet" href="../../assets/css/components/footer.css">
    <link rel="stylesheet" href="../../assets/css/components/loader.css">

</head>

<body>

    <div id="loader-container"></div>

    <div id="dashboard-wrapper">

        <aside id="sidebar-container" data-component="../../components/sidebar.html"></aside>

        <main id="main-content">

            <header id="navbar-container" data-component="../../components/navbar.html"></header>

            <section id="dashboard-content">

                <section class="page-header">
                    <div>
                        <h1>My Bookings</h1>
                        <p>Track and manage all your service bookings.</p>
                    </div>
                </section>

                <section class="bookings-tabs" id="bookingsTabs">
                    <button class="tab-btn active" data-status="ALL">All</button>
                    <button class="tab-btn" data-status="PENDING">Pending</button>
                    <button class="tab-btn" data-status="ACCEPTED">Accepted</button>
                    <button class="tab-btn" data-status="IN_PROGRESS">In Progress</button>
                    <button class="tab-btn" data-status="COMPLETED">Completed</button>
                    <button class="tab-btn" data-status="CANCELLED">Cancelled</button>
                </section>

                <section id="bookingsList" class="bookings-list">
                    <div class="loading-placeholder">Loading your bookings…</div>
                </section>

            </section>

            <footer id="footer-container" data-component="../../components/footer.html"></footer>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/utils/helpers.js"></script>

    <script src="../../assets/js/services/api-client.js"></script>
    <script src="../../assets/js/services/auth-service.js"></script>

    <script src="../../assets/js/components/loader.js"></script>
    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/components/navbar.js"></script>
    <script src="../../assets/js/components/footer.js"></script>

    <script src="../../assets/js/customer/bookings.js"></script>

</body>

</html>
