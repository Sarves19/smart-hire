<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Smart Hire</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../assets/css/customer/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/customer/profile.css">

    <link rel="stylesheet" href="../../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../../assets/css/components/navbar.css">
    <link rel="stylesheet" href="../../assets/css/components/footer.css">
    <link rel="stylesheet" href="../../assets/css/components/loader.css">

</head>

<body>

    <div id="loader-container"></div>

    <div id="dashboard-wrapper">

        <aside id="sidebar-container" data-component="../../components/sidebar.html"></aside>

        <main id="main-content">

            <header id="navbar-container" data-component="../../components/navbar.html"></header>

            <section id="dashboard-content">

                <section class="page-header">
                    <div>
                        <h1>My Profile</h1>
                        <p>Manage your personal information.</p>
                    </div>
                </section>

                <div class="profile-layout">

                    <div class="profile-card profile-photo-card">
                        <h3>Profile Photo</h3>
                        <div id="profileImagePreview" class="profile-image-preview" aria-label="Profile image">?</div>
                        <form id="profileImageForm">
                            <label for="profileImage">JPEG, PNG, or WebP (max 5 MB)</label>
                            <input type="file" id="profileImage" accept="image/jpeg,image/png,image/webp" required>
                            <div id="imageFormError" class="form-error" hidden></div>
                            <div id="imageFormSuccess" class="form-success" hidden></div>
                            <button type="submit" class="btn-primary-inline-btn">Upload Photo</button>
                        </form>
                    </div>

                    <!-- Account details -->
                    <div class="profile-card">

                        <h3>Account Details</h3>

                        <form id="accountForm">

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">First Name</label>
                                    <input type="text" id="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name</label>
                                    <input type="text" id="lastName" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" disabled>
                                <p class="field-hint">Email cannot be changed.</p>
                            </div>

                            <div class="form-group">
                                <label for="phoneNumber">Phone Number</label>
                                <input type="tel" id="phoneNumber" required>
                            </div>

                            <div id="accountFormError" class="form-error" style="display:none;"></div>
                            <div id="accountFormSuccess" class="form-success" style="display:none;"></div>

                            <button type="submit" class="btn-primary-inline-btn">Save Account Details</button>

                        </form>

                    </div>

                    <div class="profile-card">
                        <h3>Change Password</h3>
                        <form id="passwordForm">
                            <div class="form-group"><label for="currentPassword">Current Password</label><input type="password" id="currentPassword" autocomplete="current-password" required></div>
                            <div class="form-group"><label for="newPassword">New Password</label><input type="password" id="newPassword" autocomplete="new-password" minlength="12" required></div>
                            <p class="field-hint">Use 12+ characters with uppercase, lowercase, number, and symbol.</p>
                            <div id="passwordFormError" class="form-error" hidden></div>
                            <div id="passwordFormSuccess" class="form-success" hidden></div>
                            <button type="submit" class="btn-primary-inline-btn">Change Password</button>
                        </form>
                    </div>

                    <!-- Address / location -->
                    <div class="profile-card">

                        <h3>Address</h3>

                        <form id="addressForm">

                            <div class="form-group">
                                <label for="address">Street Address</label>
                                <input type="text" id="address" placeholder="No. 12, Main Street">
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City</label>
                                    <input type="text" id="city" placeholder="Kandy">
                                </div>
                                <div class="form-group">
                                    <label for="district">District</label>
                                    <input type="text" id="district" placeholder="Kandy">
                                </div>
                            </div>

                            <div id="addressFormError" class="form-error" style="display:none;"></div>
                            <div id="addressFormSuccess" class="form-success" style="display:none;"></div>

                            <button type="submit" class="btn-primary-inline-btn">Save Address</button>

                        </form>

                    </div>

                </div>

            </section>

            <footer id="footer-container" data-component="../../components/footer.html"></footer>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/utils/helpers.js"></script>

    <script src="../../assets/js/services/api-client.js"></script>
    <script src="../../assets/js/services/auth-service.js"></script>

    <script src="../../assets/js/components/loader.js"></script>
    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/components/navbar.js"></script>
    <script src="../../assets/js/components/footer.js"></script>

    <script src="../../assets/js/customer/profile.js"></script>

</body>

</html>
