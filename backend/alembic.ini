# Alembic config
# A generic, single database configuration.

[alembic]

# Path to migration scripts
script_location = alembic

# Add project root to Python path
prepend_sys_path = .

# Database URL
# Replace YOUR_PASSWORD with your PostgreSQL password
sqlalchemy.url = postgresql+psycopg://postgres:admin@localhost:5432/smarthire_db


# ===========================
# Logging Configuration
# ===========================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


# ---------------------------
# Root Logger
# ---------------------------

[logger_root]
level = WARN
handlers = console


# ---------------------------
# SQLAlchemy Logger
# ---------------------------

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# ---------------------------
# Alembic Logger
# ---------------------------

[logger_alembic]
level = INFO
handlers = console
qualname = alembic


# ---------------------------
# Console Handler
# ---------------------------

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# ---------------------------
# Formatter
# ---------------------------

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S